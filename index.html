<script>
(function() {
  var PIN_HASH = '2d87bf8c9d80ac79caa5553efc2ace391aebed8c986b665ddbbef87ad8a6f6cf';
  var SESSION_KEY = '__fin_auth__';
  var SESSION_HOURS = 12;

  function sha256(str) {
    // Simple hash check via stored hash comparison
    // We store the hash and compare
    return null; // not needed - we use pre-computed hash
  }

  function isLoggedIn() {
    try {
      var s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
      if (!s) return false;
      if (Date.now() > s.exp) { sessionStorage.removeItem(SESSION_KEY); return false; }
      return s.hash === PIN_HASH;
    } catch(e) { return false; }
  }

  function login(pin) {
    // Use SubtleCrypto to hash the PIN
    var encoder = new TextEncoder();
    var data = encoder.encode(pin);
    return crypto.subtle.digest('SHA-256', data).then(function(hashBuffer) {
      var hashArray = Array.from(new Uint8Array(hashBuffer));
      var hashHex = hashArray.map(function(b) { return b.toString(16).padStart(2,'0'); }).join('');
      if (hashHex === PIN_HASH) {
        sessionStorage.setItem(SESSION_KEY, JSON.stringify({
          hash: PIN_HASH,
          exp: Date.now() + SESSION_HOURS * 60 * 60 * 1000
        }));
        return true;
      }
      return false;
    });
  }

  function showLoginScreen() {
    var overlay = document.createElement('div');
    overlay.id = '__login_overlay__';
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#F5F5F5;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:DM Sans,system-ui,sans-serif;';

    var box = document.createElement('div');
    box.style.cssText = 'background:#fff;border-radius:24px;padding:40px 32px;width:340px;display:flex;flex-direction:column;align-items:center;gap:24px;box-shadow:0 4px 40px rgba(0,0,0,0.08);';

    var logo = document.createElement('div');
    logo.style.cssText = 'width:56px;height:56px;background:#1A2521;border-radius:16px;display:flex;align-items:center;justify-content:center;';
    logo.innerHTML = '<svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M2 17L12 11L22 17M2 12L12 6L22 12" stroke="#C9A87C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    var title = document.createElement('div');
    title.style.cssText = 'text-align:center;';
    title.innerHTML = '<div style="font-size:20px;font-weight:700;color:#1A2521;margin-bottom:4px;">Finanzas Lyra & Mayk</div><div style="font-size:13px;color:#888;">Ingresa tu PIN para continuar</div>';

    var pinDisplay = document.createElement('div');
    pinDisplay.style.cssText = 'display:flex;gap:12px;';
    var dots = [0,1,2,3].map(function(i) {
      var d = document.createElement('div');
      d.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#E5E5E5;transition:background 0.15s;';
      return d;
    });
    dots.forEach(function(d) { pinDisplay.appendChild(d); });

    var keypad = document.createElement('div');
    keypad.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;';

    var pin = '';
    var errMsg = document.createElement('div');
    errMsg.style.cssText = 'font-size:12px;color:#E24B4A;height:16px;text-align:center;';

    function updateDots() {
      dots.forEach(function(d, i) {
        d.style.background = i < pin.length ? '#1A2521' : '#E5E5E5';
      });
    }

    function handleKey(val) {
      if (val === 'del') {
        pin = pin.slice(0,-1);
        updateDots();
        return;
      }
      if (pin.length >= 4) return;
      pin += val;
      updateDots();
      if (pin.length === 4) {
        login(pin).then(function(ok) {
          if (ok) {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.3s';
            setTimeout(function() { document.body.removeChild(overlay); }, 300);
          } else {
            errMsg.textContent = 'PIN incorrecto';
            dots.forEach(function(d) { d.style.background = '#E24B4A'; });
            setTimeout(function() {
              pin = '';
              updateDots();
              errMsg.textContent = '';
            }, 800);
          }
        });
      }
    }

    var keys = ['1','2','3','4','5','6','7','8','9','','0','del'];
    keys.forEach(function(k) {
      var btn = document.createElement('button');
      if (k === '') {
        btn.style.cssText = 'background:transparent;border:none;';
        keypad.appendChild(btn);
        return;
      }
      btn.textContent = k === 'del' ? '⌫' : k;
      btn.style.cssText = 'background:#F5F5F5;border:none;border-radius:14px;height:60px;font-size:'+(k==='del'?'20':'22')+'px;font-weight:'+(k==='del'?'400':'500')+';color:#1A2521;cursor:pointer;transition:background 0.1s;font-family:inherit;';
      btn.addEventListener('mousedown', function() { btn.style.background = '#E5E5E5'; });
      btn.addEventListener('mouseup', function() { btn.style.background = '#F5F5F5'; });
      btn.addEventListener('click', function() { handleKey(k); });
      keypad.appendChild(btn);
    });

    // Keyboard support
    document.addEventListener('keydown', function onKey(e) {
      if (!document.getElementById('__login_overlay__')) {
        document.removeEventListener('keydown', onKey);
        return;
      }
      if (e.key >= '0' && e.key <= '9') handleKey(e.key);
      if (e.key === 'Backspace') handleKey('del');
    });

    box.appendChild(logo);
    box.appendChild(title);
    box.appendChild(pinDisplay);
    box.appendChild(keypad);
    box.appendChild(errMsg);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  }

  // Check auth on load
  if (!isLoggedIn()) {
    document.addEventListener('DOMContentLoaded', function() {
      showLoginScreen();
    });
  }
})();
</script>

// Supabase REST API helper
async function supaFetch(path, method, body) {
  const opts = {
    method: method || 'GET',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  if (method === 'POST') opts.headers['Prefer'] = 'resolution=ignore-duplicates,return=minimal';
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

window.storage = {
  // Save to localStorage immediately + sync to Supabase
  set: async function(key, value) {
    localStorage.setItem(key, value);
    try {
      const parsed = JSON.parse(value);
      if (key === 'fin-v4') {
        // Extract txns array from app state
        const txns = Array.isArray(parsed) ? parsed : (parsed.txns || []);
        if (txns.length > 0) {
          // Upsert all txns to Supabase
          await supaFetch('txns?on_conflict=id', 'POST', txns.map(function(t) {
            return {
              id: t.id, fecha: t.fecha, tipo: t.tipo,
              categoria: t.categoria || '', subcategoria: t.subcategoria || '',
              descripcion: t.descripcion || '', valor: t.valor || 0,
              metodo: t.metodo || '', estado: t.estado || '',
              fuente: t.fuente || '', es_calendario: t.esCalendario || false
            };
          }));
        }
      } else if (key === 'creditos_v1') {
        await supaFetch('config?key=eq.creditos', 'DELETE');
        await supaFetch('config', 'POST', {key: 'creditos', value: value});
      } else if (key === 'ahorros_v1') {
        await supaFetch('config?key=eq.ahorros', 'DELETE');
        await supaFetch('config', 'POST', {key: 'ahorros', value: value});
      } else if (key === 'reglas_custom') {
        fetch(SUPA_URL + '/rest/v1/config', { method:'POST', headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'}, body: JSON.stringify({key:'reglas', value:value}) }).catch(function(){});
      } else if (key === 'cats_custom_v1') {
        await supaFetch('config?key=eq.cats', 'DELETE');
        await supaFetch('config', 'POST', {key: 'cats', value: value});
      } else if (key === 'prestamos_v1') {
        await supaFetch('config?key=eq.prestamos', 'DELETE');
        await supaFetch('config', 'POST', {key: 'prestamos', value: value});
      }
    } catch(e) { console.warn('Supabase write failed (saved locally):', e.message); }
    return { key, value };
  },

  // Read from localStorage (fast) - Supabase loads on startup
  get: async function(key) {
    const v = localStorage.getItem(key);
    return v ? { value: v } : null;
  },

  delete: async function(key) {
    localStorage.removeItem(key);
    return { key, deleted: true };
  },

  list: async function(prefix) {
    return { keys: Object.keys(localStorage).filter(function(k) {
      return !prefix || k.startsWith(prefix);
    }) };
  },

  // Load all data from Supabase into localStorage (for new devices)
  loadFromSupabase: async function() {
    try {
      // Load transactions
      const txns = await supaFetch('txns?select=*&order=fecha.asc&limit=5000');
      if (txns && txns.length > 0) {
        // Check if this device already has data
        var existing = localStorage.getItem('fin-v4');
        var parsed = existing ? JSON.parse(existing) : null;
        var hasTxns = parsed && (
          (Array.isArray(parsed) && parsed.length > 0) ||
          (parsed.txns && parsed.txns.length > 0)
        );
        if (!hasTxns) {
          // New device - load from Supabase
          var mappedTxns = txns.map(function(t) {
            return {
              id: t.id, fecha: t.fecha, tipo: t.tipo,
              categoria: t.categoria, subcategoria: t.subcategoria,
              descripcion: t.descripcion, valor: t.valor,
              metodo: t.metodo, estado: t.estado,
              fuente: t.fuente, esCalendario: t.es_calendario
            };
          });
          localStorage.setItem('fin-v4', JSON.stringify({txns: mappedTxns}));
          console.log('✅ Loaded', mappedTxns.length, 'transactions from Supabase');
        }
      }

      // Load config (creditos, ahorros, etc)
      const config = await supaFetch('config?select=*');
      if (config) {
        config.forEach(function(row) {
          if (row.key === 'creditos')  localStorage.setItem('creditos_v1', row.value);
          if (row.key === 'ahorros')   localStorage.setItem('ahorros_v1', row.value);
          if (row.key === 'prestamos') localStorage.setItem('prestamos_v1', row.value);
          if (row.key === 'reglas') {
            localStorage.setItem('reglas_custom', row.value);
            try { window.__customRules = JSON.parse(row.value); } catch(e) {}
          }
          if (row.key === 'cats')      localStorage.setItem('cats_custom_v1', row.value);
          if (row.key === 'ppto' || row.key === 'cuotasTC') {
            try {
              var parsed = JSON.parse(row.value);
              var fin = JSON.parse(localStorage.getItem('fin-v4') || '{}');
              if (Array.isArray(fin)) fin = { txns: fin };
              // Always sync ppto and cuotasTC from Supabase (source of truth)
              if (row.key === 'ppto' && parsed.length > 0)     fin.ppto = parsed;
              if (row.key === 'cuotasTC' && parsed.length > 0) fin.cuotasTC = parsed;
              localStorage.setItem('fin-v4', JSON.stringify(fin));
              console.log('✅ Synced from Supabase:', row.key, parsed.length + ' items');
            } catch(e) { console.warn('sync error ' + row.key + ':', e.message); }
          }
        });
      }
      return true;
    } catch(e) {
      console.warn('Supabase load failed:', e.message);
      return false;
    }
  }
};

window.addEventListener('load', function() {

  window.__doReclasificar = function() {
    alert('Cargando app... intenta de nuevo en un momento');
  };

  // Load custom rules IMMEDIATELY before anything else
  var _reglasRaw = localStorage.getItem('reglas_custom');
  if (_reglasRaw) {
    try { window.__customRules = JSON.parse(_reglasRaw); } catch(e) {}
  }

  // Check if this is a new device (no local data)
  var existing = localStorage.getItem('fin-v4');
  var parsed = existing ? JSON.parse(existing) : null;
  var hasTxns = parsed && (
    (Array.isArray(parsed) && parsed.length > 0) ||
    (parsed.txns && parsed.txns.length > 0)
  );

  if (!hasTxns) {
    // New device - load from Supabase BEFORE mounting app
    console.log('New device detected - loading from Supabase...');
    window.storage.loadFromSupabase().then(function(ok) {
      if (ok) {
        console.log('Supabase sync complete');
        // Page will reload automatically after data loads
      } else {
        // No Supabase data either - mount with pre-loaded txns
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      }
    });
  } else {
    // Existing device - mount immediately with local data
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    // Sync ppto from Supabase so budget changes are shared
    window.storage.loadFromSupabase().then(function(ok) {
      if (ok) console.log('Supabase sync complete');
    }).catch(function(){});
  }
});

<script>
// Mobile layout patches
(function() {
  var W = window.innerWidth;
  var isMobile = W < 640;
  var isSmall = W < 480;
  if (!isMobile) return;

  // Watch for DOM changes and apply mobile fixes
  var observer = new MutationObserver(function() {
    // Fix 3-column grids to 1 column on mobile
    document.querySelectorAll('[style]').forEach(function(el) {
      var s = el.style;
      if (s.gridTemplateColumns === 'repeat(3,1fr)' || s.gridTemplateColumns === 'repeat(3, 1fr)') {
        s.gridTemplateColumns = '1fr';
      }
      // Fix 2-column grids to 1 column on very small screens
      if (isSmall && (s.gridTemplateColumns === '1fr 1fr' || s.gridTemplateColumns === '1fr  1fr')) {
        s.gridTemplateColumns = '1fr';
      }
      // Fix fixed widths that overflow
      if (parseInt(s.width) > W - 32) {
        s.width = '100%';
        s.maxWidth = (W - 32) + 'px';
      }
      // Fix padding on small screens
      if (parseInt(s.padding) > 16 && isSmall) {
        s.padding = '12px';
      }
    });
    
    // Fix bottom nav overflow
    var nav = document.querySelector('nav');
    if (nav) {
      nav.style.overflowX = 'auto';
      nav.style.overflowY = 'hidden';
    }
  });
  
  observer.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ['style'] });
  
  // Initial run after app mounts
  setTimeout(function() {
    observer.takeRecords(); // trigger
  }, 1000);
})();
</script>
